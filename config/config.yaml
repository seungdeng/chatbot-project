# 카테고리 목록
categories:
  - "학사운영"
  - "교육과정"
  - "논문제출 자격시험"
  - "학위논문"
  - "장학금"
  - "각종 위원회"
  - "증명서"
  - "조교·근로·학사보조"
  - "시설·IT·생활 안내"
  - "행사·비교과·교육프로그램"

# 프롬프트 템플릿
prompts:
  query_classification: |
    다음 질문이 대학교 교학팀 문의 사항인지 판별하고, 맞다면 주어진 카테고리에서 최대 3개의 카테고리를 선택해주세요.

    질문: {query}

    카테고리 목록: {category}

    판단 기준:
    1. 질문이 대학교 교학팀의 학사 행정 업무와 관련된 내용인지 먼저 판단하세요.
    2. 학사 행정과 관련 없는 인사, 잡담, 일반 지식 질문은 GARBAGE로 판단하세요.
    3. 관련된 경우 가장 적절한 카테고리를 선택하세요.
    4. 하나의 질문이 여러 주제를 포함하면 최대 3개의 카테고리를 선택할 수 있습니다.
    5. 반드시 제공된 카테고리 목록에서만 선택하세요.
  
    다음 형식으로만 답변하세요:
    - 가비지 쿼리 (교학팀과 무관)인 경우: "GARBAGE"
    - 정상 쿼리인 경우: "VALID| 카테고리명(, VALID| 카테고리명)"
    - 새로운 카테고리를 생성하지 마세요.
    - 반드시 위 형식만 사용하고 다른 설명은 작성하지 마세요.

    예시:
    - "안녕하세요" → GARBAGE
    - "수강신청 기간이 언제인가요?" → VALID| 학사운영
    - "교내 와이파이 연결방법이 어떻게 되나요?" → VALID| 시설·IT·생활 안내
    - "전일제 장학생도 교육 조교 신청이 가능해?" → VALID| 장학금, VALID| 조교·근로·학사보조

    답변:
  
  answer_generation: |
    주어진 규정·내규·공지사항 문서를 바탕으로 질문에 명확히 답변하세요.

    답변 작성 기준:
    - 현재 날짜 {date}를 기반으로 답변이 적합한지 확인하세요.
    - 답변은 "/n"으로 구분된 여러 문단으로 작성하세요.
    - 반드시 제공된 문서에 근거하여 답변하세요.
    - 문서에 없는 내용을 추측하거나 임의로 보완하지 마세요.
    - 질문과 직접 관련된 내용만 사용하여 답변하세요.
    - 문서에 정보가 부족하거나 확인되지 않는 경우, 해당 내용은 문서에서 확인되지 않는다고 명시하세요.
    - 문서에 포함된 기간, 학기, 연도, 시행일 등이 현재 날짜 {date} 기준으로 지난 정보라면, 이전 기준 정보일 수 있음을 분명히 밝히세요.
    - 여러 문서가 있더라도 서로 충돌하는 내용을 임의로 단정하지 말고, 문서 기준으로 확인되는 범위까지만 답변하세요.
    - 답변만 작성하고, 불필요한 설명이나 메타 문장은 포함하지 마세요.

    질문: {query}
    문서: {context}
    답변:
  
  document_validation: |  
    다음 문서가 사용자 질문과 관련이 있는지 판단하세요.

    사용자 질문: {query}

    문서 내용:
    {document}

    판단 기준:
    - YES: 문서에 질문의 주제와 직접적으로 관련된 정보 또는 답변에 도움이 되는 내용이 포함된 경우
    - NO: 문서의 주제가 질문과 다르거나, 질문에 대한 정보를 제공하지 않는 경우
    
    추가 기준:
    - 문서의 핵심 주제가 질문과 관련이 있을 때만 YES로 판단하세요.
    - 단순히 키워드가 유사하다는 이유만으로 YES로 판단하지 마세요.
    - 문서에 질문과 직접적으로 관련된 내용이 없다면 NO로 판단하세요.

    다음 형식으로만 답변하세요:
    "YES" 또는 "NO"

    답변:

  context_validation: |
    다음 문서들로 사용자 질문에 답변할 수 있는지 판단해주세요.

    사용자 질문: {query}

    관련 문서:
    {context}

    판단 기준:
    - YES: 문서에 질문에 대한 정보를 포함하고 있으며, 해당 문서들만으로 질문에 답변을 작성할 수 있는 경우
    - NO:  문서가 질문과 관련이 없거나, 질문에 답하기 위한 핵심 정보가 부족하거나 불명확한 경우

    추가 기준:
    - 문서에 질문과 관련된 내용이 일부 포함되어 있더라도, 답변을 작성하기에 충분하지 않다면 NO로 판단하세요.
    - 질문에 필요한 기간, 조건, 절차 등의 핵심 정보가 문서에 없다면 NO로 판단하세요.
    - 문서에 질문과 직접 관련된 내용이 없는 경우 NO로 판단하세요.


    다음 형식으로만 답변하세요:
    "YES" 또는 "NO|이유"

    예시:
    - "YES"
    - "NO|문서에 구체적인 기간 정보가 없음"

    답변:
  
  conditional_check: |
    사용자 질문과 관련 문서를 보고, 답변이 사용자의 개별 조건/상황에 따라 달라지는지 판단하세요.

    사용자 질문: {query}

    관련 문서:
    {context}

    판단 기준:
    - CONDITIONAL (조건부): 답변이 사용자의 개인 조건에 따라 달라지는 경우
      (예: 학년, 입학년도, 전공, 이수학점, 성적, 소득 수준, 개인 신청 여부 등)
    - COMPLETE (완전): 모든 학생에게 동일하게 적용되는 일반적인 정보인 경우
      (예: 학사 일정, 공통 행정 절차, 공통 규정 등)
      
    추가 기준:
    - 질문에 특정 개인 조건이 필요하지 않고 모든 학생에게 동일하게 적용된다면 COMPLETE로 판단하세요.
    - 문서에 개인 조건이 명시되어 있고 그 조건에 따라 결과가 달라진다면 CONDITIONAL로 판단하세요.
    - 질문이 일반적인 규정 설명을 묻는 경우에는 COMPLETE로 판단하세요.

    예시:
    - "수강신청 기간은 언제인가요?" → COMPLETE (모두 동일)
    - "저는 휴학 가능한가요?" → CONDITIONAL (개인 상황 필요)
    - "장학금 신청 방법은?" → COMPLETE (일반적 절차)
    - "제가 장학금 받을 수 있나요?" → CONDITIONAL (성적, 소득 등 필요)
    - "졸업 요건이 뭔가요?" → CONDITIONAL (입학년도, 전공에 따라 다름)

    "CONDITIONAL" 또는 "COMPLETE"로만 답변하세요:
  
  conditional_response: |
    규정을 바탕으로 답변하되, 사용자의 상황에 따라 답변이 달라질 수 있음을 명시하고 몇 가지 예시를 들어 설명하세요.
    답변에는 어떤 문서를 기반으로 답변을 생성하였는지 근거를 함께 제시하세요.

    답변 작성 기준:
    - 반드시 제공된 규정 문서를 기반으로 답변하세요.
    - 문서에 없는 내용을 추측하거나 임의로 보완하지 마세요.
    - 문서에서 확인되지 않는 내용은 "문서에서 확인되지 않습니다."라고 명시하세요.
    - 현재 날짜 {date}를 기준으로 답변이 적합한지 확인하세요.
    - 문서에 포함된 기간, 학기, 연도 등이 현재 날짜 {date} 기준으로 지난 정보라면 이전 기준 정보일 수 있음을 분명히 밝히세요.
    - 답변은 여러 문단으로 작성하고 각 문단은 "/n"으로 구분하세요.
    - 답변 형식(1,2,3)을 반드시 따르세요.
    - 답변만 작성하고 불필요한 설명이나 메타 문장은 작성하지 마세요.

    답변 형식:
    1. 일반적인 규정 설명
    2. 필요한 추가 정보 안내
    3. 교학팀 문의 안내

    질문: {query}
    규정: {context}
    답변:
